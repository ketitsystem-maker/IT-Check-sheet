<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary-color: #1a73e8; /* สีปุ่ม Scanning */
      --success-color: #2ecc71;
      --error-color: #e74c3c;
      --history-color: #5f6368; /* สีปุ่มประวัติ */
      --bg-color: #FFFFFF; /* สีพื้นหลัง */
      --card-bg: #1e1e1e;
      --text-color: #ffffff;
      --input-bg: #2c2c2c;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-color);
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 15px; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: var(--card-bg);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      padding: 45px 35px;
      width: 100%;
      max-width: 550px; 
      transition: all 0.3s ease;
    }

    @media (min-width: 768px) {
      .card { max-width: 900px; padding: 70px; }
      h2 { font-size: 3.8rem; }
      #result { font-size: 2.2rem; } 
      input[type="text"] { font-size: 2.4rem; } 
      label { font-size: 1.6rem; } 
      .main-btn { font-size: 2rem; }
    }

    h2 {
      text-align: center;
      margin: 0 0 40px 0;
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--text-color);
      letter-spacing: -1px;
    }

    #reader {
      width: 100% !important;
      border-radius: 24px;
      overflow: hidden;
      border: 5px solid #333 !important;
      background: #000;
    }

    #reader button {
      padding: 22px 40px !important;
      border-radius: 16px !important;
      background-color: var(--primary-color) !important;
      color: white !important;
      border: none !important;
      font-weight: 800 !important;
      font-size: 1.6rem !important;
      margin: 15px 5px !important;
      cursor: pointer;
    }

    #result {
      text-align: center;
      margin: 35px 0;
      padding: 35px;
      border-radius: 24px;
      font-size: 1.7rem; 
      background: rgba(255,255,255,0.05);
      border: 3px dashed #666;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      line-height: 1.6;
    }

    .success {
      background: rgba(46, 204, 113, 0.2) !important;
      border: 3px solid var(--success-color) !important;
      color: var(--success-color);
    }

    .input-section { margin-top: 40px; }

    label {
      display: block;
      margin-bottom: 20px;
      color: #ddd;
      font-size: 1.5rem;
      text-align: center;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 28px; 
      font-size: 2.1rem;
      border: 4px solid #444;
      background: var(--input-bg);
      color: white;
      border-radius: 20px;
      text-align: center;
      outline: none;
      transition: all 0.3s;
      font-weight: 700;
    }

    .main-btn {
      width: 100%;
      padding: 28px;
      font-size: 1.8rem;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 900;
      margin-top: 20px;
      transition: all 0.2s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: block;
      text-decoration: none;
      text-align: center;
    }

    .main-btn:active { transform: scale(0.94); }

    #manualSubmitBtn { background: var(--primary-color); color: white; }
    #nextStepButton { background: var(--success-color); color: white; display: none; }
    #restartButton { background: #555; color: white; }
    
    /* สไตล์เฉพาะสำหรับปุ่มตรวจสอบประวัติ */
    .history-btn { 
      background: var(--history-color); 
      color: white; 
      margin-top: 15px;
      border: 1px solid #777;
    }
    .history-btn-highlight {
      background: #34495e;
      border: 2px solid var(--primary-color);
    }

    .loading-dots:after {
      content: ' .';
      animation: dots 1.5s steps(5, end) infinite;
    }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>IT Self-Check Sheet</h2>
    
    <div id="reader"></div>
    
    <div id="result">--- พร้อมสำหรับการตรวจสอบ ---</div>

    <div id="inputSection" class="input-section">
      <label>ไม่มี QR Code? กรอกชื่อหรือ Asset ที่นี่</label>
      <input type="text" id="manualAssetInput" placeholder="ตัวอย่าง: KETCOM0000 หรือ 5-26-01-02-345" autocomplete="off">
      <button id="manualSubmitBtn" class="main-btn">ค้นหาข้อมูล</button>
      <!-- ปุ่มตรวจสอบประวัติหน้าแรก -->
      <a href="https://drive.google.com/drive/folders/1SaZHN-7SbjwGCWkv4Eb0gTMB-ZrKklau?usp=sharing" target="_blank" class="main-btn history-btn">ตรวจสอบประวัติ</a>
      <a href="https://forms.gle/9pJFZP4BbB7ipsY26" target="_blank" style="color:#3498db; text-decoration:underline; font-size:1.6rem; display:block; margin-bottom:15px; text-align:center;">หรือคลิกที่นี่เพื่อกรอกฟอร์มเปล่า</a>
    </div>

    <div id="nextButtonContainer" style="display: none;">
      <div id="errorActions" style="display:none;"></div>
      <button id="nextStepButton" class="main-btn">ดำเนินการต่อ (เข้าสู่แบบฟอร์ม)</button>
      <button id="restartButton" class="main-btn">สแกนใหม่ / กลับหน้าแรก</button>
    </div>
  </div>
</div>

<script>
  var html5QrcodeScanner;
  var formPublicUrl = "<?= formUrl ?>";
  var historyFolderUrl = "https://drive.google.com/drive/folders/1SaZHN-7SbjwGCWkv4Eb0gTMB-ZrKklau?usp=sharing";
  var currentScanKey = "";

  function startScanner() {
    const width = document.getElementById('reader').offsetWidth;
    const qrSize = width > 600 ? 500 : Math.floor(width * 0.9);

    html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", 
      { 
        fps: 25, 
        qrbox: { width: qrSize, height: qrSize },
        aspectRatio: 1.0,
        showTorchButtonIfSupported: false,
        rememberLastUsedCamera: true
      }, 
      false
    );
    html5QrcodeScanner.render(onScanSuccess);
    setTimeout(customizeLibraryUI, 600);
  }

  function customizeLibraryUI() {
    const stopBtn = document.getElementById('reader__camera_stop_button');
    if (stopBtn) stopBtn.innerText = "หยุดการสแกน";
    const startBtn = document.getElementById('reader__camera_start_button');
    if (startBtn) startBtn.innerText = "เริ่มสแกนด้วยกล้อง";
  }

  function onScanSuccess(decodedText) {
    processInput(decodedText);
  }

  function processInput(scanKey) {
    if (!scanKey) return;
    currentScanKey = scanKey;
    
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear().catch(e => console.error(e));
    }

    const resultElement = document.getElementById('result');
    const inputSection = document.getElementById('inputSection');
    const nextContainer = document.getElementById('nextButtonContainer');
    const nextBtn = document.getElementById('nextStepButton');
    const errorActions = document.getElementById('errorActions');

    errorActions.style.display = 'none';
    nextBtn.disabled = false;
    nextBtn.innerHTML = "ดำเนินการต่อ (เข้าสู่แบบฟอร์ม)";
    nextBtn.style.display = "block";

    resultElement.innerHTML = `<div style="font-size: 1.7rem;">✅ พบรหัสอุปกรณ์</div><div style="font-size:3.2rem; font-weight:900; color:var(--success-color); margin-top:12px; letter-spacing: 1px;">${scanKey}</div>`;
    resultElement.className = 'success';
    
    inputSection.style.display = 'none';
    nextContainer.style.display = 'block';
  }

  function handleNextStep() {
    const nextBtn = document.getElementById('nextStepButton');
    const resultElement = document.getElementById('result');
    
    nextBtn.disabled = true;
    nextBtn.innerHTML = '<span class="loading-dots">กำลังดึงข้อมูล</span>';
    
    google.script.run
      .withSuccessHandler(function(prefilledUrl) {
        resultElement.innerHTML = "🎉 พบข้อมูล! กำลังเปิดหน้าแบบฟอร์ม...";
        window.open(prefilledUrl, '_blank');
        resultElement.innerHTML = `<div style="color: var(--success-color); font-weight:bold; font-size:2rem;">เปิดหน้าฟอร์มเรียบร้อย!</div>`;
        nextBtn.style.display = 'none';
      })
      .withFailureHandler(function(error) {
        onLookupFailure(error);
      })
      .startRedirect(currentScanKey);
  }

  function onLookupFailure(error) {
    const resultElement = document.getElementById('result');
    const nextBtn = document.getElementById('nextStepButton');
    const errorActions = document.getElementById('errorActions');
    
    resultElement.className = ''; 
    resultElement.innerHTML = `<div style="color:var(--error-color); font-weight:bold; margin-bottom:15px; font-size:1.7rem;">⚠️ ${error.message}</div>`;
    
    // ตรวจสอบเงื่อนไข Error ว่าถูกสแกนไปแล้วหรือไม่
    if (error.message.includes("ได้รับการตรวจสอบไปแล้ว")) {
      errorActions.innerHTML = `<a href="${historyFolderUrl}" target="_blank" class="main-btn history-btn history-btn-highlight">ตรวจสอบประวัติ</a>`;
      errorActions.style.display = 'block';
    } else {
      resultElement.innerHTML += `<a href="${formPublicUrl}" target="_blank" style="color:#3498db; text-decoration:underline; font-size:1.6rem; display:block; margin-bottom:15px;">หรือคลิกที่นี่เพื่อกรอกฟอร์มเปล่า</a>`;
    }
    
    nextBtn.style.display = 'none';
  }

  function restartScan() {
    location.reload();
  }

  window.onload = function() {
    startScanner();
    //document.getElementById('restartButton').onclick = restartScan;
    //document.getElementById('restartButton').onclick = () => location.reload(true);
    document.getElementById('restartButton').onclick = function() {
    google.script.run
    .withSuccessHandler(function(url) {
      window.open(url, '_top');
    })
    .getServiceUrl(); // เราต้องสร้างฟังก์ชันนี้ในไฟล์ .gs
    };
    document.getElementById('nextStepButton').onclick = handleNextStep;
    document.getElementById('manualSubmitBtn').onclick = function() {
      const val = document.getElementById('manualAssetInput').value.trim();
      if(val) processInput(val);
    };
    document.getElementById('manualAssetInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('manualSubmitBtn').click();
    });
  };
</script>

</body>
</html>
